<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Job | BetterWallet StaffHook</title>
<style>
  body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:0;}
  .container{max-width:480px;margin:0 auto;padding:24px 16px 60px;box-sizing:border-box;}
  .top-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .back-btn{width:40px;height:40px;border-radius:10px;background-color:#151515;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;font-size:18px;flex-shrink:0;}
  .heading h1{font-size:20px;margin:0;}
  .heading p{font-size:13px;color:#8b9290;margin:2px 0 0;}

  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{flex:1;text-align:center;padding:10px 8px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;border:1px solid #2a2a2a;color:#cfd3d2;background-color:#111111;}
  .tab.active{background-color:#00ff88;color:#000000;border-color:#00ff88;}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
  .field input, .field textarea{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:14px;color:#fff;font-size:14px;box-sizing:border-box;font-family:inherit;}
  .field textarea{min-height:90px;resize:vertical;}
  .field input::placeholder, .field textarea::placeholder{color:#666;}

  .btn-primary{display:block;width:100%;background:#00ff88;color:#000;border:none;border-radius:999px;padding:16px;font-size:16px;font-weight:700;margin-top:8px;cursor:pointer;}
  .btn-primary:disabled{background:#444;color:#999;cursor:not-allowed;}

  .status-message{font-size:13px;margin-top:10px;text-align:center;}
  .status-message.success{color:#00ff88;}
  .status-message.error{color:#ff4d4d;}

  .error-text{color:#ff4d4d;font-size:13px;margin:-10px 0 14px;}
</style>
</head>
<body>
<div class="container">

  <div class="top-row">
    <a href="/dashboard" class="back-btn">←</a>
    <div class="heading">
      <h1>Staff Hook</h1>
      <p>Find work · hire talent</p>
    </div>
  </div>

  <div class="tabs">
    <a href="/staffhook/jobs" class="tab">Find Jobs</a>
    <a href="/staffhook/post-job" class="tab">Post a Job</a>
    <div class="tab active">Request a Job</div>
  </div>

  <div class="field">
    <label>Full Name</label>
    <input type="text" id="full_name" placeholder="e.g. John Okoye">
  </div>
  <div class="field">
    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="e.g. 08012345678">
  </div>
  <div class="field">
    <label>Skill / What you do</label>
    <input type="text" id="skill" placeholder="e.g. Painter, Cleaner, Driver">
  </div>
  <div class="field">
    <label>Bio (optional)</label>
    <textarea id="bio" placeholder="Tell employers about your experience"></textarea>
  </div>
  <div class="field">
    <label>Location</label>
    <input type="text" id="location" placeholder="e.g. Asaba, Delta State">
  </div>

  <div id="form-error" class="error-text" style="display:none;">Please fill in all required fields.</div>

  <button class="btn-primary" id="submit-btn" onclick="submitListing()">Post My Listing (Free)</button>
  <div class="status-message" id="status-message"></div>

</div>

<script>
  function submitListing(){
    const full_name = document.getElementById('full_name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const skill = document.getElementById('skill').value.trim();
    const bio = document.getElementById('bio').value.trim();
    const location = document.getElementById('location').value.trim();

    const errorDiv = document.getElementById('form-error');
    const statusDiv = document.getElementById('status-message');
    const btn = document.getElementById('submit-btn');

    if (!full_name || !phone || !skill || !location) {
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';

    btn.disabled = true;
    btn.textContent = 'Posting...';

    fetch('/staffhook/request-job', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ full_name, phone, skill, bio, location })
    })
    .then(response => response.json().then(data => ({ status: response.status, body: data })))
    .then(result => {
      if (result.status === 201) {
        statusDiv.textContent = result.body.message;
        statusDiv.className = 'status-message success';
        btn.textContent = 'Posted!';
      } else {
        statusDiv.textContent = result.body.error;
        statusDiv.className = 'status-message error';
        btn.disabled = false;
        btn.textContent = 'Post My Listing (Free)';
      }
    })
    .catch(() => {
      statusDiv.textContent = 'Something went wrong. Please try again.';
      statusDiv.className = 'status-message error';
      btn.disabled = false;
      btn.textContent = 'Post My Listing (Free)';
    });
  }
</script>

</body>
</html>
